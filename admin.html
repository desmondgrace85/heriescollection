<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heries Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pink:#FF5EAB;--yellow:#FFE03B;--blue:#4FC3F7;--purple:#C084FC;}
body{background:#0a0a0a;font-family:'DM Sans',sans-serif;color:#fff;min-height:100vh;max-width:480px;margin:0 auto;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin-bottom:4px;}
.login-logo span{background:linear-gradient(90deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{font-size:13px;color:#555;margin-bottom:36px;}
.login-card{background:#151515;border-radius:20px;padding:28px 22px;width:100%;}
.login-card h2{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:#1e1e1e;border:1.5px solid #2a2a2a;border-radius:12px;padding:13px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pink);}
.field textarea{resize:none;height:80px;}
.field select option{background:#1e1e1e;}
.login-btn{width:100%;background:var(--pink);color:#fff;padding:14px;border-radius:100px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;}
.login-err{color:var(--pink);font-size:12px;margin-top:10px;display:none;text-align:center;}

/* APP */
#adminApp{display:none;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 12px;background:#0a0a0a;position:sticky;top:0;z-index:100;border-bottom:1px solid #1a1a1a;}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
.topbar-logo span{background:linear-gradient(90deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logout-btn{background:#1a1a1a;border:none;color:#666;font-size:13px;padding:8px 16px;border-radius:100px;cursor:pointer;}
.tabs{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #1a1a1a;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;background:#151515;color:#555;border:none;position:relative;transition:all .2s;font-family:'DM Sans',sans-serif;}
.tab-btn.active{background:var(--pink);color:#fff;}
.tab-badge{position:absolute;top:-4px;right:-4px;background:#ff3b30;color:#fff;font-size:9px;font-weight:700;border-radius:50%;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;}
.tab-content{display:none;padding:16px 20px 60px;}
.tab-content.active{display:block;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:#151515;border-radius:14px;padding:16px;}
.stat-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;}
.pink{color:var(--pink);}.yellow{color:var(--yellow);}.blue{color:var(--blue);}.purple{color:var(--purple);}.green{color:#4ade80;}
.sec-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:14px;}

/* ALERT */
.alert-bar{background:#1a0a10;border:1px solid rgba(255,94,171,.2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin:12px 20px 0;}
.alert-dot{width:10px;height:10px;border-radius:50%;background:var(--pink);flex-shrink:0;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,94,171,.5);}50%{box-shadow:0 0 0 6px rgba(255,94,171,0);}}
.alert-text{font-size:13px;color:var(--pink);font-weight:700;}
.alert-sub{font-size:11px;color:#664;}

/* PRODUCTS */
.add-btn-full{width:100%;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;padding:14px;border-radius:100px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:16px;}
.prod-card{background:#151515;border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:10px;}
.prod-thumb{width:62px;height:62px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px;}
.prod-thumb img{width:100%;height:100%;object-fit:cover;}
.bg-pink{background:#FFE8F3;}.bg-blue{background:#E3F4FF;}.bg-yellow{background:#FFF9D6;}.bg-purple{background:#F3E8FF;}.bg-green{background:#E8FFE8;}.bg-coral{background:#FFE8E0;}.bg-teal{background:#E0F7F7;}.bg-orange{background:#FFF0E0;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.prod-cat{font-size:11px;color:#555;text-transform:uppercase;}
.prod-price{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--yellow);margin-top:4px;}
.prod-actions{display:flex;flex-direction:column;gap:6px;}
.edit-btn{background:#1e1e1e;border:none;color:var(--blue);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.del-btn{background:#1e1e1e;border:none;color:var(--pink);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}

/* ORDERS */
.filter-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;}
.filter-bar::-webkit-scrollbar{display:none;}
.f-btn{flex-shrink:0;padding:7px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;background:#1e1e1e;color:#555;border:none;font-family:'DM Sans',sans-serif;}
.f-btn.active{background:var(--pink);color:#fff;}
.order-card-a{background:#151515;border-radius:14px;padding:16px;margin-bottom:10px;}
.oca-id{font-size:10px;color:#444;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.oca-name{font-weight:700;font-size:14px;margin:3px 0;}
.oca-meta{font-size:12px;color:#555;}
.oca-addr{font-size:11px;color:#444;margin-top:3px;}
.oca-items{font-size:12px;color:#555;margin-top:5px;line-height:1.5;}
.oca-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;}
.ostatus{display:inline-flex;align-items:center;padding:5px 12px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.os-pending{background:#2a2000;color:#fbbf24;}.os-confirmed{background:#0a2a1a;color:#4ade80;}.os-progress{background:#0a1a2a;color:#38bdf8;}.os-delivered{background:#1a0a2a;color:#c084fc;}.os-rejected{background:#2a0a0a;color:#f87171;}
.status-btns{display:flex;flex-wrap:wrap;gap:6px;}
.s-btn{padding:7px 12px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.sb-confirm{background:#0a2a1a;color:#4ade80;}.sb-progress{background:#0a1a2a;color:#38bdf8;}.sb-deliver{background:#1a0a2a;color:#c084fc;}.sb-reject{background:#2a0a0a;color:#f87171;}.sb-pending{background:#2a2000;color:#fbbf24;}

/* CUSTOMERS */
.cust-card{background:#151515;border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.cust-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.cust-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.cust-phone{font-size:12px;color:#555;}
.cust-joined{font-size:11px;color:#444;margin-top:2px;}
.cust-orders{font-size:12px;color:var(--yellow);font-weight:700;margin-top:4px;}

/* COMPLAINTS */
.comp-card{background:#151515;border-radius:14px;padding:14px;margin-bottom:10px;border-left:3px solid var(--pink);}
.comp-card.read{border-left-color:#2a2a2a;opacity:.6;}
.comp-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.comp-user{font-weight:700;font-size:13px;}
.comp-phone{font-size:11px;color:#555;margin-top:2px;}
.comp-date{font-size:11px;color:#444;}
.comp-text{font-size:13px;color:#aaa;line-height:1.6;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);display:inline-block;margin-right:5px;}
.mark-read-btn{background:#1e1e1e;border:none;color:#555;font-size:11px;padding:6px 12px;border-radius:8px;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;}

/* CATEGORIES */
.cat-item{background:#151515;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cat-name{font-weight:600;font-size:14px;text-transform:capitalize;}
.cat-del{background:none;border:none;color:var(--pink);font-size:18px;cursor:pointer;}
.cat-add-row{display:flex;gap:10px;margin-top:4px;}
.cat-input{flex:1;background:#1e1e1e;border:1.5px solid #2a2a2a;border-radius:12px;padding:12px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.cat-input:focus{border-color:var(--pink);}
.cat-add-btn{background:var(--pink);color:#fff;border:none;border-radius:12px;padding:12px 18px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}

/* ANNOUNCE */
.ann-form-wrap{background:#151515;border-radius:14px;padding:18px;margin-bottom:16px;}
.ann-form-wrap h3{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;margin-bottom:14px;}
.ann-card{background:#151515;border-radius:14px;padding:14px;margin-bottom:10px;border-left:3px solid var(--purple);}
.ann-title-t{font-weight:700;font-size:14px;margin-bottom:4px;}
.ann-body-t{font-size:13px;color:#888;line-height:1.5;margin-bottom:6px;}
.ann-time-t{font-size:11px;color:#444;}
.ann-del-btn{background:#1e1e1e;border:none;color:var(--pink);font-size:11px;padding:5px 12px;border-radius:8px;cursor:pointer;margin-top:6px;font-family:'DM Sans',sans-serif;}
.ann-send-btn{width:100%;background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;padding:13px;border-radius:100px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#151515;border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal h2{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-save{flex:1;background:var(--pink);color:#fff;padding:14px;border-radius:100px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;}
.modal-cancel{background:#1e1e1e;color:#555;padding:14px 20px;border-radius:100px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;}

/* IMAGE UPLOAD */
.multi-img-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.multi-img-item{position:relative;width:80px;height:80px;border-radius:10px;overflow:hidden;}
.multi-img-item img{width:100%;height:100%;object-fit:cover;}
.multi-img-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.add-more-img{width:80px;height:80px;border-radius:10px;border:2px dashed #333;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;color:#555;background:#1e1e1e;position:relative;}
.img-spinner{display:none;font-size:12px;color:var(--pink);margin-top:8px;}

/* EMOJI GRID */
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.emoji-opt{width:40px;height:40px;border-radius:10px;background:#1e1e1e;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.emoji-opt.sel{border-color:var(--pink);}

/* EMPTY / TOAST */
.adm-empty{text-align:center;padding:50px 20px;color:#333;}
.adm-empty .ei{font-size:44px;margin-bottom:10px;}
.adm-empty p{font-size:14px;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(10px);background:#252525;color:#fff;padding:12px 24px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">Heries <span>Admin</span></div>
  <div class="login-sub">Management Dashboard</div>
  <div class="login-card">
    <h2>Sign In 🔐</h2>
    <div class="field"><label>Username</label><input type="text" id="loginUser" placeholder="admin"/></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••"/></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <div class="topbar">
    <div class="topbar-logo">Heries <span>Admin</span></div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>

  <div id="compAlert" style="display:none" onclick="switchTab('complaints')">
    <div class="alert-bar">
      <div class="alert-dot"></div>
      <div><div class="alert-text" id="alertText">New complaints</div><div class="alert-sub">Tap to review</div></div>
      <div style="margin-left:auto">→</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tb-overview" onclick="switchTab('overview')">Overview</button>
    <button class="tab-btn" id="tb-products" onclick="switchTab('products')">Products</button>
    <button class="tab-btn" id="tb-orders" onclick="switchTab('orders')">Orders<span class="tab-badge" id="ordersBadge" style="display:none"></span></button>
    <button class="tab-btn" id="tb-customers" onclick="switchTab('customers')">Customers</button>
    <button class="tab-btn" id="tb-complaints" onclick="switchTab('complaints')">Complaints<span class="tab-badge" id="compBadge" style="display:none"></span></button>
    <button class="tab-btn" id="tb-categories" onclick="switchTab('categories')">Categories</button>
    <button class="tab-btn" id="tb-announce" onclick="switchTab('announce')">📢 Announce</button>
  </div>

  <div class="tab-content active" id="tc-overview">
    <div class="stats-grid" id="statsGrid"><div style="grid-column:1/-1;color:#333;text-align:center;padding:20px">Loading...</div></div>
    <div class="sec-title">Recent Orders</div>
    <div id="recentOrders"></div>
  </div>
  <div class="tab-content" id="tc-products">
    <button class="add-btn-full" onclick="openModal()">＋ Add New Product</button>
    <div class="sec-title">All Products</div>
    <div id="productList"></div>
  </div>
  <div class="tab-content" id="tc-orders">
    <div class="filter-bar">
      <button class="f-btn active" onclick="filterOrders('all',this)">All</button>
      <button class="f-btn" onclick="filterOrders('pending',this)">Pending</button>
      <button class="f-btn" onclick="filterOrders('confirmed',this)">Confirmed</button>
      <button class="f-btn" onclick="filterOrders('progress',this)">In Progress</button>
      <button class="f-btn" onclick="filterOrders('delivered',this)">Delivered</button>
      <button class="f-btn" onclick="filterOrders('rejected',this)">Rejected</button>
    </div>
    <div id="allOrdersList"></div>
  </div>
  <div class="tab-content" id="tc-customers"><div id="customersList"></div></div>
  <div class="tab-content" id="tc-complaints"><div id="complaintsList"></div></div>
  <div class="tab-content" id="tc-categories">
    <div class="sec-title">Manage Categories</div>
    <p style="font-size:13px;color:#555;margin-bottom:16px;line-height:1.5">Add or remove categories. Changes show instantly on the user site.</p>
    <div id="catList"></div>
    <div class="cat-add-row">
      <input class="cat-input" id="catInput" placeholder="e.g. anklets, sets, gifts..."/>
      <button class="cat-add-btn" onclick="addCategory()">Add</button>
    </div>
  </div>
  <div class="tab-content" id="tc-announce">
    <div class="ann-form-wrap">
      <h3>📢 Send Announcement</h3>
      <div class="field"><label>Title</label><input type="text" id="annTitle" placeholder="e.g. Weekend Sale 🔥"/></div>
      <div class="field"><label>Message</label><textarea id="annBody" placeholder="Write your message..."></textarea></div>
      <div class="field"><label>Icon</label>
        <select id="annIcon">
          <option value="📢">📢 General</option><option value="🔥">🔥 Sale</option>
          <option value="✨">✨ New Release</option><option value="🎁">🎁 Special Offer</option>
          <option value="📦">📦 Delivery</option><option value="🎉">🎉 Celebration</option>
        </select>
      </div>
      <button class="ann-send-btn" onclick="sendAnnouncement()">Send to All Customers 📢</button>
    </div>
    <div class="sec-title">Sent Announcements</div>
    <div id="annList"></div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOut(event)">
  <div class="modal">
    <h2 id="modalTitle">Add Product</h2>
    <input type="hidden" id="editId"/>
    <div class="field">
      <label>Product Photos (up to 5 images)</label>
      <div class="multi-img-row" id="multiImgRow"></div>
      <div class="img-spinner" id="imgSpinner">⏳ Processing image...</div>
    </div>
    <div class="field"><label>Product Name</label><input type="text" id="fName" placeholder="e.g. Stardust Gold Ring"/></div>
    <div class="field"><label>Category</label><select id="fCat"></select></div>
    <div class="field"><label>Price (GH₵)</label><input type="number" id="fPrice" placeholder="150"/></div>
    <div class="field"><label>Old Price (leave blank if no discount)</label><input type="number" id="fOldPrice" placeholder=""/></div>
    <div class="field"><label>Badge</label>
      <select id="fBadge"><option value="">None</option><option value="new">New</option><option value="sale">Sale</option><option value="hot">Hot</option></select>
    </div>
    <div class="field"><label>Description</label><textarea id="fDesc" placeholder="Short product description..."></textarea></div>
    <div class="field"><label>Emoji (shown if no photo)</label><div class="emoji-grid" id="emojiGrid"></div></div>
    <div class="field"><label>Card Background Color</label><div class="emoji-grid" id="bgGrid"></div></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" id="saveBtn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<!-- Hidden file input for images -->
<input type="file" id="imgFileInput" accept="image/*,image/heic" style="display:none" onchange="handleImgFile(this)"/>

<script>
// ==================== CONSTANTS ====================
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'heries2025';
const DEFAULT_CATS = ['rings','necklaces','bracelets','earrings','others'];
const EMOJIS = ['💍','📿','✨','💫','🌿','🌸','🦋','🌙','🔮','💎','🌟','⭐','🌈','💜','❤️','💛','🩷','🌺','🌻','⌚','🎀','💄','👑','🦚'];
const BGS = [
  {cls:'bg-pink',color:'#FFE8F3'},{cls:'bg-blue',color:'#E3F4FF'},{cls:'bg-yellow',color:'#FFF9D6'},
  {cls:'bg-purple',color:'#F3E8FF'},{cls:'bg-green',color:'#E8FFE8'},{cls:'bg-coral',color:'#FFE8E0'},
  {cls:'bg-teal',color:'#E0F7F7'},{cls:'bg-orange',color:'#FFF0E0'}
];

// ==================== STATE ====================
let products=[], orders=[], users=[], complaints=[], categories=[], uploadedImages=[];
let selEmoji='💍', selBg='bg-pink', curFilter='all';

// ==================== UTILS ====================
function $(id){return document.getElementById(id);}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// ==================== LOGIN ====================
function doLogin(){
  const u=$('loginUser').value.trim();
  const p=$('loginPass').value.trim();
  const btn=$('loginBtn');
  const err=$('loginErr');
  err.style.display='none';

  if(u!==ADMIN_USER||p!==ADMIN_PASS){
    err.textContent='Wrong credentials. Try again.';
    err.style.display='block';
    return;
  }

  btn.textContent='Connecting...';
  btn.disabled=true;

  // Test Firebase connection
  db.collection('products').limit(1).get()
    .then(()=>{
      $('loginScreen').style.display='none';
      $('adminApp').style.display='block';
      startListeners();
      buildEmojiGrid();
      buildBgGrid();
      renderTab('overview');
    })
    .catch(e=>{
      err.textContent='Firebase error: '+e.message;
      err.style.display='block';
    })
    .finally(()=>{
      btn.textContent='Sign In →';
      btn.disabled=false;
    });
}

$('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogout(){
  $('loginScreen').style.display='flex';
  $('adminApp').style.display='none';
}

// ==================== REAL-TIME LISTENERS ====================
function startListeners(){
  db.collection('products').orderBy('createdAt','asc').onSnapshot(snap=>{
    products=snap.docs.map(d=>({id:d.id,...d.data()}));
    refreshTab();
  });
  db.collection('orders').orderBy('createdAt','desc').onSnapshot(snap=>{
    orders=snap.docs.map(d=>({id:d.id,...d.data()}));
    updateOrdersBadge();
    refreshTab();
  });
  db.collection('users').onSnapshot(snap=>{
    users=snap.docs.map(d=>({id:d.id,...d.data()}));
    refreshTab();
  });
  db.collection('complaints').orderBy('createdAt','desc').onSnapshot(snap=>{
    complaints=snap.docs.map(d=>({id:d.id,...d.data()}));
    updateCompBadge();
    refreshTab();
  });
  db.collection('settings').doc('categories').onSnapshot(snap=>{
    categories=snap.exists?snap.data().list:DEFAULT_CATS;
    if(!snap.exists) db.collection('settings').doc('categories').set({list:DEFAULT_CATS});
    refreshTab();
  });
}

function refreshTab(){
  const active=document.querySelector('.tab-btn.active');
  if(active) renderTab(active.id.replace('tb-',''));
}

// ==================== TABS ====================
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  $('tb-'+name).classList.add('active');
  $('tc-'+name).classList.add('active');
  renderTab(name);
  if(name==='complaints') markAllRead();
}

function renderTab(name){
  if(name==='overview') renderOverview();
  else if(name==='products') renderProducts();
  else if(name==='orders') renderOrders(curFilter);
  else if(name==='customers') renderCustomers();
  else if(name==='complaints') renderComplaints();
  else if(name==='categories') renderCategories();
  else if(name==='announce') renderAnnouncements();
}

// ==================== OVERVIEW ====================
function renderOverview(){
  const revenue=orders.filter(o=>o.status==='delivered'||o.status==='confirmed').reduce((a,o)=>a+(o.total||0),0);
  const pending=orders.filter(o=>o.status==='pending').length;
  const unreadC=complaints.filter(c=>!c.read).length;
  $('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Products</div><div class="stat-val pink">${products.length}</div></div>
    <div class="stat-card"><div class="stat-label">Customers</div><div class="stat-val blue">${users.length}</div></div>
    <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-val yellow">${orders.length}</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-val purple">${pending}</div></div>
    <div class="stat-card"><div class="stat-label">Revenue (GH₵)</div><div class="stat-val green">${revenue.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">New Complaints</div><div class="stat-val pink">${unreadC}</div></div>`;
  const recent=orders.slice(0,5);
  $('recentOrders').innerHTML=recent.length?recent.map(o=>orderCardHTML(o,true)).join(''):'<div class="adm-empty"><div class="ei">📦</div><p>No orders yet</p></div>';
}

function updateOrdersBadge(){
  const n=orders.filter(o=>o.status==='pending').length;
  const b=$('ordersBadge');
  if(n){b.textContent=n;b.style.display='flex';}else b.style.display='none';
}

function updateCompBadge(){
  const n=complaints.filter(c=>!c.read).length;
  const b=$('compBadge'),alert=$('compAlert');
  if(n){b.textContent=n;b.style.display='flex';alert.style.display='block';$('alertText').textContent=`${n} unread complaint${n>1?'s':''}`;}
  else{b.style.display='none';alert.style.display='none';}
}

// ==================== PRODUCTS ====================
function renderProducts(){
  const el=$('productList');
  if(!products.length){el.innerHTML='<div class="adm-empty"><div class="ei">💎</div><p>No products yet.<br>Tap + to add your first one!</p></div>';return;}
  el.innerHTML=products.map(p=>{
    const imgs=p.images&&p.images.length?p.images:p.image?[p.image]:[];
    const thumb=imgs[0]?`<img src="${imgs[0]}" style="width:100%;height:100%;object-fit:cover;"/>`:(p.emoji||'💎');
    return`<div class="prod-card">
      <div class="prod-thumb ${p.bg||'bg-pink'}">${thumb}</div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-cat">${p.category}${imgs.length>1?' · '+imgs.length+' photos':''}</div>
        <div class="prod-price">GH₵ ${p.price}${p.oldPrice?` <span style="text-decoration:line-through;color:#333;font-size:12px">GH₵${p.oldPrice}</span>`:''}</div>
      </div>
      <div class="prod-actions">
        <button class="edit-btn" onclick="editProduct('${p.id}')">Edit</button>
        <button class="del-btn" onclick="deleteProduct('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ==================== ORDERS ====================
function renderOrders(filter){
  const filtered=filter==='all'?orders:orders.filter(o=>o.status===filter);
  const el=$('allOrdersList');
  if(!filtered.length){el.innerHTML='<div class="adm-empty"><div class="ei">📦</div><p>No orders here</p></div>';return;}
  el.innerHTML=filtered.map(o=>orderCardHTML(o,false)).join('');
}

function orderCardHTML(o,compact){
  const SL={pending:'⏳ Pending',confirmed:'✅ Confirmed',progress:'🚚 In Progress',delivered:'📦 Delivered',rejected:'❌ Rejected'};
  const SC={pending:'os-pending',confirmed:'os-confirmed',progress:'os-progress',delivered:'os-delivered',rejected:'os-rejected'};
  const btns=compact?'':`<div class="status-btns">
    <button class="s-btn sb-confirm" onclick="setStatus('${o.id}','confirmed')">✅ Confirm</button>
    <button class="s-btn sb-progress" onclick="setStatus('${o.id}','progress')">🚚 In Progress</button>
    <button class="s-btn sb-deliver" onclick="setStatus('${o.id}','delivered')">📦 Delivered</button>
    <button class="s-btn sb-reject" onclick="setStatus('${o.id}','rejected')">❌ Reject</button>
    <button class="s-btn sb-pending" onclick="setStatus('${o.id}','pending')">↩ Reset</button>
  </div>`;
  return`<div class="order-card-a">
    <div class="oca-top">
      <div style="min-width:0;flex:1">
        <div class="oca-id">${o.id.slice(0,12).toUpperCase()}</div>
        <div class="oca-name">${o.userName||'Customer'}</div>
        <div class="oca-meta">📱 ${o.userPhone||''} · GH₵ ${o.total||0} · ${new Date(o.date).toLocaleDateString()}</div>
        ${o.deliveryAddress?`<div class="oca-addr">📍 ${o.deliveryAddress}</div>`:''}
        <div class="oca-items">${(o.items||[]).map(i=>`${i.name} ×${i.qty}`).join(', ')}</div>
      </div>
      <span class="ostatus ${SC[o.status]||'os-pending'}">${SL[o.status]||'⏳ Pending'}</span>
    </div>${btns}
  </div>`;
}

function filterOrders(filter,el){
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');curFilter=filter;renderOrders(filter);
}

function setStatus(id,status){
  db.collection('orders').doc(id).update({status})
    .then(()=>{const m={confirmed:'Confirmed ✅',progress:'In Progress 🚚',delivered:'Delivered 📦',rejected:'Rejected ❌',pending:'Reset'};toast(m[status]||'Updated');})
    .catch(()=>toast('Failed. Check internet.'));
}

// ==================== CUSTOMERS ====================
function renderCustomers(){
  const el=$('customersList');
  if(!users.length){el.innerHTML='<div class="adm-empty"><div class="ei">👤</div><p>No customers yet</p></div>';return;}
  el.innerHTML=[...users].reverse().map(u=>{
    const uOrders=orders.filter(o=>o.userId===u.id);
    const spent=uOrders.filter(o=>o.status==='confirmed'||o.status==='delivered').reduce((a,o)=>a+(o.total||0),0);
    return`<div class="cust-card">
      <div class="cust-av">${(u.name||'?')[0].toUpperCase()}</div>
      <div>
        <div class="cust-name">${u.name}</div>
        <div class="cust-phone">📱 ${u.phone}</div>
        <div class="cust-joined">Joined ${new Date(u.joined).toLocaleDateString()}</div>
        <div class="cust-orders">📦 ${uOrders.length} order${uOrders.length!==1?'s':''} · GH₵ ${spent.toLocaleString()}</div>
      </div>
    </div>`;
  }).join('');
}

// ==================== COMPLAINTS ====================
function renderComplaints(){
  const el=$('complaintsList');
  if(!complaints.length){el.innerHTML='<div class="adm-empty"><div class="ei">💬</div><p>No complaints yet</p></div>';return;}
  el.innerHTML=complaints.map(c=>`<div class="comp-card ${c.read?'read':''}">
    <div class="comp-head">
      <div>${!c.read?'<span class="unread-dot"></span>':''}<span class="comp-user">${c.userName||'Customer'}</span><div class="comp-phone">📱 ${c.userPhone||''}</div></div>
      <div class="comp-date">${new Date(c.date).toLocaleDateString()}</div>
    </div>
    <div class="comp-text">${c.text}</div>
    ${!c.read?`<button class="mark-read-btn" onclick="markRead('${c.id}')">Mark as read ✓</button>`:''}
  </div>`).join('');
}

function markAllRead(){
  complaints.filter(c=>!c.read).forEach(c=>{
    db.collection('complaints').doc(c.id).update({read:true}).catch(()=>{});
  });
}
function markRead(id){db.collection('complaints').doc(id).update({read:true}).catch(()=>toast('Failed'));}

// ==================== CATEGORIES ====================
function renderCategories(){
  const el=$('catList');
  if(!categories.length){el.innerHTML='<div class="adm-empty"><div class="ei">🏷️</div><p>No categories yet</p></div>';return;}
  el.innerHTML=categories.map(cat=>`<div class="cat-item">
    <span class="cat-name">${cat}</span>
    <button class="cat-del" onclick="deleteCategory('${cat}')">✕</button>
  </div>`).join('');
}

function addCategory(){
  const input=$('catInput');
  const name=input.value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!name){toast('Enter a category name');return;}
  if(categories.includes(name)){toast('Already exists');return;}
  const newCats=[...categories,name];
  db.collection('settings').doc('categories').set({list:newCats})
    .then(()=>{input.value='';toast('Category added ✅');})
    .catch(()=>toast('Failed.'));
}

function deleteCategory(cat){
  if(!confirm('Delete "'+cat+'" category?'))return;
  const newCats=categories.filter(c=>c!==cat);
  db.collection('settings').doc('categories').set({list:newCats})
    .then(()=>toast('Deleted'))
    .catch(()=>toast('Failed.'));
}

// ==================== ANNOUNCEMENTS ====================
function sendAnnouncement(){
  const title=$('annTitle').value.trim(),body=$('annBody').value.trim(),icon=$('annIcon').value;
  if(!title||!body){toast('Fill in title and message');return;}
  db.collection('announcements').add({title,body,icon,date:new Date().toISOString(),createdAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(()=>{$('annTitle').value='';$('annBody').value='';toast('Sent 📢');renderAnnouncements();})
    .catch(()=>toast('Failed.'));
}

function renderAnnouncements(){
  db.collection('announcements').orderBy('createdAt','desc').get().then(snap=>{
    const anns=snap.docs.map(d=>({id:d.id,...d.data()}));
    const el=$('annList');
    el.innerHTML=anns.length?anns.map(a=>`<div class="ann-card">
      <div class="ann-title-t">${a.icon} ${a.title}</div>
      <div class="ann-body-t">${a.body}</div>
      <div class="ann-time-t">${new Date(a.date).toLocaleString()}</div>
      <button class="ann-del-btn" onclick="deleteAnn('${a.id}')">Delete</button>
    </div>`).join(''):'<div class="adm-empty"><div class="ei">📢</div><p>No announcements yet</p></div>';
  });
}

function deleteAnn(id){
  db.collection('announcements').doc(id).delete()
    .then(()=>{toast('Deleted');renderAnnouncements();})
    .catch(()=>toast('Failed.'));
}

// ==================== IMAGE UPLOAD ====================
function compressImg(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=900;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.82));
    };
    img.onerror=()=>cb(null);
    img.src=e.target.result;
  };
  reader.onerror=()=>cb(null);
  reader.readAsDataURL(file);
}

function handleImgFile(input){
  if(!input.files||!input.files[0])return;
  if(uploadedImages.length>=5){toast('Max 5 photos');return;}
  $('imgSpinner').style.display='block';
  compressImg(input.files[0],data=>{
    $('imgSpinner').style.display='none';
    if(!data){toast('Could not read image');return;}
    uploadedImages.push(data);
    input.value='';
    renderImgRow();
    toast('Photo added ✅');
  });
}

function renderImgRow(){
  const row=$('multiImgRow');
  let html=uploadedImages.map((img,i)=>`<div class="multi-img-item"><img src="${img}"/><button class="multi-img-del" onclick="removeImg(${i})">✕</button></div>`).join('');
  if(uploadedImages.length<5){
    html+=`<div class="add-more-img" onclick="$('imgFileInput').click()">＋</div>`;
  }
  row.innerHTML=html;
}

function removeImg(i){uploadedImages.splice(i,1);renderImgRow();}

// ==================== EMOJI/BG GRIDS ====================
function buildEmojiGrid(){
  $('emojiGrid').innerHTML=EMOJIS.map(e=>`<div class="emoji-opt${e===selEmoji?' sel':''}" onclick="pickEmoji('${e}',this)">${e}</div>`).join('');
}
function pickEmoji(e,el){selEmoji=e;document.querySelectorAll('#emojiGrid .emoji-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}

function buildBgGrid(){
  $('bgGrid').innerHTML=BGS.map(b=>`<div class="emoji-opt${b.cls===selBg?' sel':''}" style="background:${b.color};border-color:${b.cls===selBg?'var(--pink)':'transparent'}" onclick="pickBg('${b.cls}',this)"></div>`).join('');
}
function pickBg(cls,el){selBg=cls;document.querySelectorAll('#bgGrid .emoji-opt').forEach(x=>{x.classList.remove('sel');x.style.borderColor='transparent';});el.classList.add('sel');el.style.borderColor='var(--pink)';}

function buildCatSelect(){
  const sel=$('fCat');
  sel.innerHTML=categories.map(c=>`<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('');
}

// ==================== MODAL ====================
function openModal(id=null){
  $('modalTitle').textContent=id?'Edit Product':'Add Product';
  $('editId').value=id||'';
  uploadedImages=[];
  $('imgSpinner').style.display='none';
  buildCatSelect();buildEmojiGrid();buildBgGrid();

  if(id){
    const p=products.find(x=>x.id===id);
    if(!p)return;
    $('fName').value=p.name;
    $('fCat').value=p.category;
    $('fPrice').value=p.price;
    $('fOldPrice').value=p.oldPrice||'';
    $('fBadge').value=p.badge||'';
    $('fDesc').value=p.desc||'';
    selEmoji=p.emoji||'💍';selBg=p.bg||'bg-pink';
    const imgs=p.images&&p.images.length?p.images:p.image?[p.image]:[];
    uploadedImages=[...imgs];
    buildEmojiGrid();buildBgGrid();
  } else {
    $('fName').value='';$('fCat').value=categories[0]||'rings';
    $('fPrice').value='';$('fOldPrice').value='';
    $('fBadge').value='';$('fDesc').value='';
    selEmoji='💍';selBg='bg-pink';
  }
  renderImgRow();
  $('modalOverlay').classList.add('open');
}

function closeModal(){$('modalOverlay').classList.remove('open');}
function closeModalOut(e){if(e.target===$('modalOverlay'))closeModal();}
function editProduct(id){openModal(id);}

function deleteProduct(id){
  if(!confirm('Delete this product?'))return;
  db.collection('products').doc(id).delete()
    .then(()=>toast('Product deleted'))
    .catch(()=>toast('Failed.'));
}

function saveProduct(){
  const name=$('fName').value.trim();
  const cat=$('fCat').value;
  const price=parseFloat($('fPrice').value);
  const oldPrice=parseFloat($('fOldPrice').value)||null;
  const badge=$('fBadge').value||null;
  const desc=$('fDesc').value.trim();

  if(!name){toast('Please enter product name');return;}
  if(!price){toast('Please enter price');return;}

  const btn=$('saveBtn');
  btn.textContent='Saving...';btn.disabled=true;

  const data={
    name,category:cat,price,oldPrice,badge,emoji:selEmoji,bg:selBg,desc,
    images:uploadedImages,
    image:uploadedImages[0]||null
  };

  const editId=$('editId').value;
  const prom=editId
    ?db.collection('products').doc(editId).update(data)
    :db.collection('products').add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});

  prom.then(()=>{
    toast(editId?'Product updated ✅':'Product added ✅');
    closeModal();
  }).catch(e=>{
    toast('Failed: '+e.message);
  }).finally(()=>{
    btn.textContent='Save Product';btn.disabled=false;
  });
}
</script>
