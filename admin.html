<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heries Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--pink:#FF5EAB;--yellow:#FFE03B;--blue:#4FC3F7;--purple:#C084FC;--bg:#F7F4F0;--dark:#1A1A1A;--white:#ffffff;--card-radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f0f;font-family:'DM Sans',sans-serif;color:#fff;min-height:100vh;max-width:480px;margin:0 auto;}
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin-bottom:6px;}
.login-logo span{background:linear-gradient(90deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{font-size:13px;color:#666;margin-bottom:40px;}
.login-card{background:#1a1a1a;border-radius:20px;padding:28px 24px;width:100%;}
.login-card h2{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:20px;}
.field{margin-bottom:16px;}
.field label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px;}
.field input{width:100%;background:#252525;border:1.5px solid #333;border-radius:12px;padding:12px 16px;color:white;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.field input:focus{border-color:var(--pink);}
.login-btn{width:100%;background:var(--pink);color:white;padding:14px;border-radius:100px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px;}
.login-error{color:var(--pink);font-size:13px;margin-top:8px;display:none;}
#adminApp{display:none;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 12px;background:#0f0f0f;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
.topbar-logo span{background:linear-gradient(90deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-right{display:flex;gap:10px;align-items:center;}
.logout-btn{background:#1a1a1a;border:none;color:#888;font-size:13px;padding:8px 14px;border-radius:100px;cursor:pointer;}
.tabs{display:flex;gap:6px;padding:8px 20px 16px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;background:#1a1a1a;color:#666;border:none;position:relative;transition:all .2s;}
.tab.active{background:var(--pink);color:#fff;}
.tab-badge{position:absolute;top:-4px;right:-4px;background:#ff3b30;color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px 16px;}
.stat-card{background:#1a1a1a;border-radius:16px;padding:16px;}
.stat-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.stat-value{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;}
.stat-value.pink{color:var(--pink);}.stat-value.yellow{color:var(--yellow);}.stat-value.blue{color:var(--blue);}.stat-value.purple{color:var(--purple);}.stat-value.green{color:#4ade80;}
.section-wrap{padding:0 20px;margin-bottom:100px;}
.section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:12px;color:#fff;}
.add-product-btn{margin:4px 20px 16px;width:calc(100% - 40px);background:linear-gradient(135deg,var(--pink),var(--purple));color:white;padding:14px;border-radius:100px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.admin-product-list{margin-bottom:20px;}
.admin-product-card{background:#1a1a1a;border-radius:16px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:12px;}
.apc-img{width:60px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;}
.apc-img img{width:100%;height:100%;object-fit:cover;}
.bg-pink{background:#FFE8F3;}.bg-blue{background:#E3F4FF;}.bg-yellow{background:#FFF9D6;}.bg-purple{background:#F3E8FF;}.bg-green{background:#E8FFE8;}.bg-coral{background:#FFE8E0;}.bg-teal{background:#E0F7F7;}.bg-orange{background:#FFF0E0;}
.apc-info{flex:1;min-width:0;}
.apc-name{font-weight:600;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.apc-cat{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;}
.apc-price{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--yellow);margin-top:3px;}
.apc-actions{display:flex;flex-direction:column;gap:8px;}
.edit-btn{background:#252525;border:none;color:var(--blue);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.del-btn{background:#252525;border:none;color:var(--pink);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.order-card-admin{background:#1a1a1a;border-radius:16px;padding:16px;margin-bottom:12px;}
.oca-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.oca-id{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.oca-name{font-weight:600;font-size:14px;margin-top:3px;}
.oca-meta{font-size:12px;color:#666;margin-top:2px;}
.oca-items{font-size:12px;color:#888;margin-top:4px;line-height:1.5;}
.ostatus{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.os-confirmed{background:#1a3d2b;color:#4ade80;}.os-pending{background:#3d3010;color:#fbbf24;}.os-progress{background:#0f2a40;color:#38bdf8;}.os-delivered{background:#2d1b4e;color:#c084fc;}.os-rejected{background:#3d0f0f;color:#f87171;}
.status-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.status-btn{padding:6px 12px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.3px;}
.sb-confirm{background:#1a3d2b;color:#4ade80;}.sb-progress{background:#0f2a40;color:#38bdf8;}.sb-deliver{background:#2d1b4e;color:#c084fc;}.sb-reject{background:#3d0f0f;color:#f87171;}.sb-pending{background:#3d3010;color:#fbbf24;}
.filter-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.filter-bar::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;background:#252525;color:#666;border:none;}
.fbtn.active{background:var(--pink);color:#fff;}
.customer-card{background:#1a1a1a;border-radius:16px;padding:14px;margin-bottom:12px;}
.cust-top{display:flex;align-items:center;gap:12px;}
.cust-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.cust-name{font-weight:600;font-size:14px;}
.cust-phone{font-size:12px;color:#666;margin-top:2px;}
.cust-joined{font-size:11px;color:#555;margin-top:2px;}
.cust-orders{font-size:12px;color:var(--yellow);margin-top:4px;font-weight:600;}
.comp-card{background:#1a1a1a;border-radius:16px;padding:14px;margin-bottom:12px;border-left:3px solid var(--pink);}
.comp-card.read{border-left-color:#333;opacity:.7;}
.comp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.comp-user{font-weight:600;font-size:13px;}
.comp-phone{font-size:11px;color:#666;margin-top:2px;}
.comp-date{font-size:11px;color:#555;}
.comp-text{font-size:13px;color:#ccc;line-height:1.6;}
.comp-mark-read{background:#252525;border:none;color:#888;font-size:11px;padding:5px 12px;border-radius:8px;cursor:pointer;margin-top:8px;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);display:inline-block;margin-right:6px;}
.comp-alert{margin:0 20px 12px;background:linear-gradient(135deg,#3d0f1a,#1a0a0f);border:1px solid rgba(255,94,171,.3);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.comp-alert-dot{width:10px;height:10px;border-radius:50%;background:var(--pink);flex-shrink:0;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,94,171,.5);}50%{box-shadow:0 0 0 6px rgba(255,94,171,0);}}
.comp-alert-text{font-size:13px;color:var(--pink);font-weight:600;}
.comp-alert-sub{font-size:11px;color:#884466;margin-top:1px;}
.ann-card{background:#1a1a1a;border-radius:16px;padding:16px;margin-bottom:12px;border-left:3px solid var(--purple);}
.ann-title{font-weight:600;font-size:14px;margin-bottom:4px;color:#fff;}
.ann-body{font-size:13px;color:#aaa;line-height:1.5;margin-bottom:6px;}
.ann-time{font-size:11px;color:#555;}
.ann-del{background:#252525;border:none;color:var(--pink);font-size:11px;padding:5px 12px;border-radius:8px;cursor:pointer;margin-top:6px;}
.ann-form{background:#1a1a1a;border-radius:16px;padding:16px;margin-bottom:16px;}
.ann-form h3{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;margin-bottom:12px;color:#fff;}
.ann-input{width:100%;background:#252525;border:1.5px solid #333;border-radius:12px;padding:12px 16px;color:white;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}
.ann-input:focus{border-color:var(--purple);}
.ann-textarea{width:100%;background:#252525;border:1.5px solid #333;border-radius:12px;padding:12px 16px;color:white;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:none;height:80px;margin-bottom:10px;}
.ann-textarea:focus{border-color:var(--purple);}
.ann-send-btn{width:100%;background:linear-gradient(135deg,var(--purple),#9b59b6);color:white;padding:13px;border-radius:100px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.adm-empty{text-align:center;padding:40px 20px;color:#444;font-size:14px;}
.adm-empty .ico{font-size:40px;margin-bottom:10px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#1a1a1a;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal h2{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:20px;}
.modal .field label{color:#888;}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;background:#252525;border:1.5px solid #333;border-radius:12px;padding:12px 16px;color:white;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.modal .field input:focus,.modal .field select:focus,.modal .field textarea:focus{border-color:var(--pink);}
.modal .field textarea{resize:none;height:80px;}
.modal .field select option{background:#252525;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-save{flex:1;background:var(--pink);color:white;padding:14px;border-radius:100px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;}
.modal-cancel{flex:0 0 auto;background:#252525;color:#888;padding:14px 20px;border-radius:100px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;}
.img-upload-area{border:2px dashed #333;border-radius:14px;padding:20px;text-align:center;margin-top:8px;transition:border-color .2s;position:relative;cursor:pointer;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.img-upload-area:hover,.img-upload-area.has-img{border-color:var(--pink);}
.img-upload-area .preview{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px;display:none;}
.img-upload-area .preview.show{display:block;}
.img-upload-label{font-size:13px;color:#666;}
.img-upload-icon{font-size:32px;margin-bottom:6px;}
.img-upload-spinner{display:none;font-size:13px;color:var(--pink);margin-top:6px;}
#imgFileInput{position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer;font-size:0;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.emoji-opt{width:40px;height:40px;border-radius:10px;background:#252525;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.emoji-opt.selected{border-color:var(--pink);}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:white;padding:12px 24px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="loginScreen">
  <div class="login-logo">Heries <span>Admin</span></div>
  <div class="login-sub">Shop management panel</div>
  <div class="login-card">
    <h2>Sign in 🔐</h2>
    <div class="field"><label>Username</label><input type="text" id="loginUser" placeholder="admin"/></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••"/></div>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="loginError">Wrong credentials. Try again.</div>
  </div>
</div>

<div id="adminApp">
  <div class="topbar">
    <div class="topbar-logo">Heries <span>Admin</span></div>
    <div class="topbar-right">
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="comp-alert" id="compAlert" style="display:none" onclick="switchTab('complaints')">
    <div class="comp-alert-dot"></div>
    <div>
      <div class="comp-alert-text" id="compAlertText">New complaints</div>
      <div class="comp-alert-sub">Tap to review</div>
    </div>
    <div style="margin-left:auto;font-size:18px">→</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</button>
    <button class="tab" id="tab-products" onclick="switchTab('products')">Products</button>
    <button class="tab" id="tab-orders" onclick="switchTab('orders')">Orders <span class="tab-badge" id="ordersBadge" style="display:none"></span></button>
    <button class="tab" id="tab-customers" onclick="switchTab('customers')">Customers</button>
    <button class="tab" id="tab-complaints" onclick="switchTab('complaints')">Complaints <span class="tab-badge" id="compBadge" style="display:none"></span></button>
    <button class="tab" id="tab-announce" onclick="switchTab('announce')">📢 Announce</button>
  </div>

  <div id="tabContent-overview">
    <div class="stats-row" id="statsRow"></div>
    <div class="section-wrap">
      <div class="section-title">Recent Orders</div>
      <div id="recentOrdersList"></div>
    </div>
  </div>

  <div id="tabContent-products" style="display:none">
    <button class="add-product-btn" onclick="openModal()">＋ Add New Product</button>
    <div class="section-wrap">
      <div class="section-title">All Products</div>
      <div class="admin-product-list" id="adminProductList"></div>
    </div>
  </div>

  <div id="tabContent-orders" style="display:none">
    <div class="section-wrap" style="padding-top:16px">
      <div class="filter-bar" id="orderFilter">
        <button class="fbtn active" onclick="filterOrders('all',this)">All</button>
        <button class="fbtn" onclick="filterOrders('pending',this)">Pending</button>
        <button class="fbtn" onclick="filterOrders('confirmed',this)">Confirmed</button>
        <button class="fbtn" onclick="filterOrders('progress',this)">In Progress</button>
        <button class="fbtn" onclick="filterOrders('delivered',this)">Delivered</button>
        <button class="fbtn" onclick="filterOrders('rejected',this)">Rejected</button>
      </div>
      <div id="allOrdersList"></div>
    </div>
  </div>

  <div id="tabContent-customers" style="display:none">
    <div class="section-wrap" style="padding-top:16px">
      <div id="customersList"></div>
    </div>
  </div>

  <div id="tabContent-complaints" style="display:none">
    <div class="section-wrap" style="padding-top:16px">
      <div id="complaintsList"></div>
    </div>
  </div>

  <div id="tabContent-announce" style="display:none">
    <div class="section-wrap" style="padding-top:16px">
      <div class="ann-form">
        <h3>📢 Send Announcement</h3>
        <input class="ann-input" id="annTitle" placeholder="Title (e.g. Weekend Sale 🔥)"/>
        <textarea class="ann-textarea" id="annBody" placeholder="Write your announcement message to all customers..."></textarea>
        <select class="ann-input" id="annIcon" style="margin-bottom:10px">
          <option value="📢">📢 General Announcement</option>
          <option value="🔥">🔥 Sale / Promo</option>
          <option value="✨">✨ New Release</option>
          <option value="🎁">🎁 Special Offer</option>
          <option value="📦">📦 Delivery Update</option>
          <option value="🎉">🎉 Celebration</option>
        </select>
        <button class="ann-send-btn" onclick="sendAnnouncement()">Send to All Customers 📢</button>
      </div>
      <div class="section-title">Sent Announcements</div>
      <div id="annList"></div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">Add Product</h2>
    <input type="hidden" id="editId"/>

    <div class="field">
      <label>Product Image (optional)</label>
      <div class="img-upload-area" id="imgUploadArea">
        <input type="file" id="imgFileInput" accept="image/*,image/heic,image/heif" onchange="handleImgUpload(this)"/>
        <img class="preview" id="imgPreview" src="" alt="preview"/>
        <div id="imgUploadPrompt">
          <div class="img-upload-icon">📷</div>
          <div class="img-upload-label">Tap to upload a product photo</div>
          <div style="font-size:11px;color:#555;margin-top:3px">Supports iPhone photos, JPG, PNG</div>
        </div>
        <div class="img-upload-spinner" id="imgSpinner">⏳ Processing image...</div>
      </div>
    </div>

    <div class="field"><label>Product Name</label><input type="text" id="fName" placeholder="e.g. Stardust Gold Ring"/></div>
    <div class="field"><label>Category</label>
      <select id="fCat">
        <option value="rings">Rings 💍</option>
        <option value="necklaces">Necklaces</option>
        <option value="bracelets">Bracelets</option>
        <option value="earrings">Earrings</option>
        <option value="others">Others ✨</option>
      </select>
    </div>
    <div class="field"><label>Price (GH₵)</label><input type="number" id="fPrice" placeholder="150"/></div>
    <div class="field"><label>Old Price (leave blank if no sale)</label><input type="number" id="fOldPrice" placeholder=""/></div>
    <div class="field"><label>Badge</label>
      <select id="fBadge">
        <option value="">None</option>
        <option value="new">New</option>
        <option value="sale">Sale</option>
        <option value="hot">Hot</option>
      </select>
    </div>
    <div class="field"><label>Description</label><textarea id="fDesc" placeholder="Short product description..."></textarea></div>
    <div class="field">
      <label>Emoji Icon (used if no photo)</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="field">
      <label>Card Background Color</label>
      <div class="emoji-grid" id="bgGrid"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script>
const ADMIN_USER='admin';
const ADMIN_PASS='heries2025';

const defaultProducts=[
  {id:1,name:'Stardust Gold Ring',category:'rings',price:180,oldPrice:null,badge:'new',emoji:'💍',bg:'bg-pink',desc:'A shimmering gold ring with micro stardust detailing.',image:null},
  {id:2,name:'Crystal Dream Chain',category:'necklaces',price:195,oldPrice:250,badge:'sale',emoji:'📿',bg:'bg-blue',desc:'Delicate crystal links on a sterling silver chain.',image:null},
  {id:3,name:'Sunburst Cuff',category:'bracelets',price:140,oldPrice:null,badge:'hot',emoji:'✨',bg:'bg-yellow',desc:'Bold open cuff with a sunburst pattern.',image:null},
  {id:4,name:'Galaxy Drop Earrings',category:'earrings',price:160,oldPrice:null,badge:'new',emoji:'💫',bg:'bg-purple',desc:'Cascading drop earrings inspired by the night sky.',image:null},
  {id:5,name:'Jade Pendant',category:'necklaces',price:220,oldPrice:null,badge:'new',emoji:'🌿',bg:'bg-green',desc:'A smooth jade stone pendant on a dainty gold chain.',image:null},
  {id:6,name:'Petal Ring Set',category:'rings',price:130,oldPrice:null,badge:null,emoji:'🌸',bg:'bg-coral',desc:'Set of 3 stackable petal-shaped rings.',image:null},

function ls(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function ss(k,v){localStorage.setItem(k,JSON.stringify(v))}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  if(u===ADMIN_USER&&p===ADMIN_PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminApp').style.display='block';
    initAdmin();
  } else {
    document.getElementById('loginError').style.display='block';
  }
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('adminApp').style.display='none';
}

function initAdmin(){
  const stored=ls('hc_products');
  products=stored?JSON.parse(JSON.stringify(stored)):JSON.parse(JSON.stringify(defaultProducts));
  if(!stored)saveProducts();
  buildEmojiGrid();
  buildBgGrid();
  checkComplaints();
  renderTab('overview');
}

function saveProducts(){db.collection('products').doc('list').set({items:products});}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  ['overview','products','orders','customers','complaints','announce'].forEach(t=>{
    document.getElementById('tabContent-'+t).style.display=t===name?'block':'none';
  });
  renderTab(name);
  if(name==='complaints')markComplaintsRead();
}

function renderTab(name){
  if(name==='overview')renderOverview();
  else if(name==='products')renderProductList();
  else if(name==='orders')renderOrders(currentOrderFilter);
  else if(name==='customers')renderCustomers();
  else if(name==='complaints')renderComplaints();
  else if(name==='announce')renderAnnouncements();
}

function renderOverview(){renderStats();renderRecentOrders();}

function renderStats(){
  const allOrders=ls('hc_all_orders')||[];db.collection('orders').doc('list').get().then(doc=>{if(doc.exists)allOrders.push(...doc.data().items);});
  const users=ls('hc_users')||[];
  const complaints=(ls('hc_complaints')||[]).filter(c=>!c.read);
  const revenue=allOrders.filter(o=>o.status==='delivered'||o.status==='confirmed').reduce((a,o)=>a+o.total,0);
  const pendingCount=allOrders.filter(o=>o.status==='pending').length;
  const row=document.getElementById('statsRow');
  row.innerHTML=`
    <div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value pink">${products.length}</div></div>
    <div class="stat-card"><div class="stat-label">Customers</div><div class="stat-value blue">${users.length}</div></div>
    <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value yellow">${allOrders.length}</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value purple">${pendingCount}</div></div>
    <div class="stat-card"><div class="stat-label">Revenue (GH₵)</div><div class="stat-value green">${revenue.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">Complaints</div><div class="stat-value pink">${complaints.length} new</div></div>
  `;
}

function renderRecentOrders(){
  const allOrders=(ls('hc_all_orders')||[]).slice(-5).reverse();
  const el=document.getElementById('recentOrdersList');
  if(allOrders.length===0){el.innerHTML='<div class="adm-empty"><div class="ico">📦</div>No orders yet</div>';return;}
  el.innerHTML=allOrders.map(o=>orderCardHTML(o,true)).join('');
}

function checkComplaints(){
  const comps=(ls('hc_complaints')||[]).filter(c=>!c.read);
  const badge=document.getElementById('compBadge');
  const alert=document.getElementById('compAlert');
  const alertText=document.getElementById('compAlertText');
  if(comps.length>0){
    badge.textContent=comps.length;badge.style.display='flex';
    alert.style.display='flex';
    alertText.textContent=`${comps.length} unread complaint${comps.length>1?'s':''}`;

function filterOrders(status,el){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  renderOrders(status);
}

function renderOrders(filter='all'){
  const allOrders=ls('hc_all_orders')||[];
  const filtered=filter==='all'?allOrders:allOrders.filter(o=>o.status===filter);
  const el=document.getElementById('allOrdersList');
  const pendingCount=allOrders.filter(o=>o.status==='pending').length;
  const badge=document.getElementById('ordersBadge');
  if(pendingCount>0){badge.textContent=pendingCount;badge.style.display='flex';}
  else{badge.style.display='none';}
  if(filtered.length===0){el.innerHTML='<div class="adm-empty"><div class="ico">📦</div>No orders here</div>';return;}
  el.innerHTML=[...filtered].reverse().map(o=>orderCardHTML(o,false)).join('');
}

function orderCardHTML(o,compact){
  const statusLabel={pending:'⏳ Pending',confirmed:'✅ Confirmed',progress:'🚚 In Progress',delivered:'📦 Delivered',rejected:'❌ Rejected'};
  const statusClass={pending:'os-pending',confirmed:'os-confirmed',progress:'os-progress',delivered:'os-delivered',rejected:'os-rejected'};
  const btns=compact?'':`<div class="status-btns">
    <button class="status-btn sb-confirm" onclick="setOrderStatus('${o.id}','confirmed')">✅ Confirm</button>
    <button class="status-btn sb-progress" onclick="setOrderStatus('${o.id}','progress')">🚚 In Progress</button>
    <button class="status-btn sb-deliver" onclick="setOrderStatus('${o.id}','delivered')">📦 Delivered</button>
    <button class="status-btn sb-reject" onclick="setOrderStatus('${o.id}','rejected')">❌ Reject</button>
    <button class="status-btn sb-pending" onclick="setOrderStatus('${o.id}','pending')">↩ Pending</button>
  </div>`;
  return`<div class="order-card-admin">
    <div class="oca-top">
      <div>
        <div class="oca-id">${o.id}</div>
        <div class="oca-name">${o.userName||'Customer'}</div>
        <div class="oca-meta">${o.userPhone||''} · GH₵ ${o.total} · ${new Date(o.date).toLocaleDateString()}</div>
        <div class="oca-items">${o.items.map(i=>`${i.name} ×${i.qty}`).join(', ')}</div>
      </div>
      <span class="ostatus ${statusClass[o.status]||'os-pending'}">${statusLabel[o.status]||'⏳ Pending'}</span>
    </div>
    ${btns}
  </div>`;
}

function setOrderStatus(orderId,status){
  const allOrders=ls('hc_all_orders')||[];
  const o=allOrders.find(x=>x.id===orderId);
  if(o){o.status=status;db.collection('orders').doc('list').set({items:allOrders});}
  const userOrders=ls('hc_orders')||[];
  const uo=userOrders.find(x=>x.id===orderId);
  if(uo){uo.status=status;ss('hc_orders',userOrders);}
  const statusMsg={confirmed:'Order confirmed ✅',progress:'Marked in progress 🚚',delivered:'Marked as delivered 📦',rejected:'Order rejected ❌',pending:'Reset to pending'};
  showToast(statusMsg[status]||'Status updated');
  renderTab(document.querySelector('.tab.active').id.replace('tab-',''));
  checkComplaints();
}

      <div class="cust-top">
        <div class="cust-av">${initial}</div>

          <div class="cust-name">${u.name}</div>
          <div class="cust-phone">📱 ${u.phone}</div>
          <div class="cust-joined">Joined ${new Date(u.joined).toLocaleDateString()}</div>
          <div class="cust-orders">📦 ${userOrders.length} order${userOrders.length!==1?'s':''} · GH₵ ${spent.toLocaleString()} spent</div>

  comps.forEach(c=>c.read=true);

  db.collection('complaints').doc('list').set({items:comps});

// ✅ FIX: iPhone image upload — uses canvas to compress & convert any format to JPEG
function handleImgUpload(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const spinner=document.getElementById('imgSpinner');
  const prompt=document.getElementById('imgUploadPrompt');
  
  // Show loading state
  spinner.style.display='block';
  prompt.style.display='none';

  // Use FileReader to read the file as a data URL
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    // Create an image element to draw on canvas
    const img=new Image();
    img.onload=()=>{
      // Compress: max 800px on longest side
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*(MAX/w));w=MAX;}
        else{w=Math.round(w*(MAX/h));h=MAX;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // Output as JPEG at 85% quality — handles HEIC, PNG, large files
      const compressed=canvas.toDataURL('image/jpeg',0.85);
      uploadedImage=compressed;
      
      const preview=document.getElementById('imgPreview');
      const area=document.getElementById('imgUploadArea');
      preview.src=compressed;
      preview.classList.add('show');
      spinner.style.display='none';
      area.classList.add('has-img');
      showToast('Image uploaded ✅');
    };
    img.onerror=()=>{
      spinner.style.display='none';
      prompt.style.display='block';
      showToast('Could not read image. Try a different photo.');
    };
    img.src=dataUrl;
  };
  reader.onerror=()=>{
    spinner.style.display='none';
    prompt.style.display='block';
    showToast('Upload failed. Please try again.');
  };
  reader.readAsDataURL(file);
}

function clearImageUpload(){
  uploadedImage=null;
  const preview=document.getElementById('imgPreview');
  const prompt=document.getElementById('imgUploadPrompt');
  const area=document.getElementById('imgUploadArea');
  const spinner=document.getElementById('imgSpinner');
  if(preview){preview.src='';preview.classList.remove('show');}
  if(prompt)prompt.style.display='block';
  if(area)area.classList.remove('has-img');
  if(spinner)spinner.style.display='none';
  const inp=document.getElementById('imgFileInput');
  if(inp)inp.value='';
}

function buildEmojiGrid(){
  const g=document.getElementById('emojiGrid');
  g.innerHTML=emojis.map(e=>`<div class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="selectEmoji('${e}',this)">${e}</div>`).join('');
}
function selectEmoji(e,el){
  selectedEmoji=e;
  document.querySelectorAll('#emojiGrid .emoji-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
}
function buildBgGrid(){
  const g=document.getElementById('bgGrid');
  g.innerHTML=bgs.map(b=>`<div class="emoji-opt${b.cls===selectedBg?' selected':''}" style="background:${b.color};border-color:${b.cls===selectedBg?'#FF5EAB':'transparent'}" onclick="selectBg('${b.cls}',this)" title="${b.label}"></div>`).join('');
}
function selectBg(cls,el){
  selectedBg=cls;
  document.querySelectorAll('#bgGrid .emoji-opt').forEach(x=>{x.classList.remove('selected');x.style.borderColor='transparent';});
  el.classList.add('selected');
  el.style.borderColor='#FF5EAB';
}

function openModal(id=null){
  document.getElementById('modalTitle').textContent=id?'Edit Product':'Add Product';
  document.getElementById('editId').value=id||'';
  clearImageUpload();
  if(id){
    const p=products.find(x=>x.id===id);
    document.getElementById('fName').value=p.name;
    document.getElementById('fCat').value=p.category;
    document.getElementById('fPrice').value=p.price;
    document.getElementById('fOldPrice').value=p.oldPrice||'';
    document.getElementById('fBadge').value=p.badge||'';
    document.getElementById('fDesc').value=p.desc||'';
    selectedEmoji=p.emoji;
    selectedBg=p.bg;
    if(p.image){
      uploadedImage=p.image;
      const preview=document.getElementById('imgPreview');
      const prompt=document.getElementById('imgUploadPrompt');
      const area=document.getElementById('imgUploadArea');
      preview.src=p.image;preview.classList.add('show');
      prompt.style.display='none';area.classList.add('has-img');
    }
  } else {
    document.getElementById('fName').value='';
    document.getElementById('fCat').value='rings';
    document.getElementById('fPrice').value='';
    document.getElementById('fOldPrice').value='';
    document.getElementById('fBadge').value='';
    document.getElementById('fDesc').value='';
    selectedEmoji='💍';selectedBg='bg-pink';
  }
  buildEmojiGrid();buildBgGrid();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function editProduct(id){openModal(id);}
function deleteProduct(id){
  if(!confirm('Delete this product?'))return;
  products=products.filter(p=>p.id!==id);
  saveProducts();renderProductList();showToast('Product deleted');
}
function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  const cat=document.getElementById('fCat').value;
  const price=parseFloat(document.getElementById('fPrice').value);
  const oldPrice=parseFloat(document.getElementById('fOldPrice').value)||null;
  const badge=document.getElementById('fBadge').value||null;
  const desc=document.getElementById('fDesc').value.trim();
  if(!name||!price){showToast('Fill in name and price');return;}
  const editId=document.getElementById('editId').value;
  if(editId){
    const p=products.find(x=>x.id===parseInt(editId));
    Object.assign(p,{name,category:cat,price,oldPrice,badge,emoji:selectedEmoji,bg:selectedBg,desc,image:uploadedImage});
  } else {
    const newProd={id:Date.now(),name,category:cat,price,oldPrice,badge,emoji:selectedEmoji,bg:selectedBg,desc,image:uploadedImage};
    products.push(newProd);
    const releases=ls('hc_new_releases')||[];
    releases.push({name,date:new Date().toISOString()});
    ss('hc_new_releases',releases);
  }
  saveProducts();
  renderProductList();
  closeModal();
  showToast(editId?'Product updated ✅':'Product added ✅');
}
